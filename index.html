<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاسبه‌گر حرفه‌ای | آریا راهبرد نیرو</title>
   
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
   
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        body { font-family: 'Vazirmatn', Tahoma, sans-serif; }
        .glass { background: rgba(255,255,255,0.97); backdrop-filter: blur(20px); }

        /* رفع رنگ‌های Tailwind */
        .bg-blue-600 { background-color: #2563eb !important; }
        .text-blue-600 { color: #2563eb !important; }
        .text-emerald-600 { color: #10b981 !important; }
        .text-violet-600 { color: #8b5cf6 !important; }

        .readonly-input {
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            pointer-events: none;
            user-select: none;
        }

        /* رفع مشکل کش آمدن نمودارها */
        .chart-wrapper {
            height: 280px;
            position: relative;
            width: 100%;
        }

        .chart-wrapper canvas {
            width: 100% !important;
            height: 280px !important;
            max-height: 280px !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen py-8">
    <div class="max-w-5xl mx-auto px-4">
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <img id="logo" src="https://i.ibb.co.com/..." alt="لوگو" class="w-20 h-20 object-contain">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800">آریا راهبرد نیرو</h1>
                    <p class="text-slate-600">طرح بهینه‌سازی روشنایی</p>
                </div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <div class="lg:col-span-2">
                <div class="glass rounded-3xl shadow-2xl p-8 sticky top-6">
                    <h2 class="text-2xl font-semibold mb-6">محاسبه سود سرمایه‌گذاری</h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">مبلغ سرمایه‌گذاری (تومان)</label>
                            <input id="investment" type="number" value="50000000000" 
                                   class="w-full rounded-2xl px-6 py-4 border border-slate-200 focus:border-blue-600 outline-none text-lg">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">نرخ تنزیل (%)</label>
                            <div class="readonly-input w-full rounded-2xl px-6 py-4 text-lg border border-slate-200 bg-slate-50 flex items-center">
                                <span id="discount_display" class="font-semibold text-slate-700">۳۰</span>
                                <span class="text-slate-500 mr-1">٪</span>
                            </div>
                            <input id="discount" type="hidden" value="30">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">مدت پروژه (سال)</label>
                            <div class="readonly-input w-full rounded-2xl px-6 py-4 text-lg border border-slate-200 bg-slate-50 flex items-center">
                                <span id="years_display" class="font-semibold text-slate-700">۷</span>
                                <span class="text-slate-500 mr-1">سال</span>
                            </div>
                            <input id="years" type="hidden" value="7">
                        </div>

                        <button onclick="calculate()" 
                                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-5 rounded-2xl text-lg transition">
                            محاسبه
                        </button>
                        
                        <button onclick="generatePDF()" id="pdfBtn" 
                                class="w-full hidden border-2 border-slate-300 hover:bg-slate-50 py-4 rounded-2xl font-medium text-lg transition">
                            📄 دانلود گزارش PDF
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="result" class="glass rounded-3xl shadow-2xl p-8 min-h-[620px]"></div>
            </div>
        </div>
    </div>

    <script>
        let profitChart, cumulativeChart;

        function formatNumber(num) {
            return Math.round(num).toLocaleString('fa-IR');
        }

        function calculate() {
            const totalProject = 2500000000000;
            const totalShares = 1000;
            const totalProfit = 17500000000000;

            let investment = Number(document.getElementById("investment").value) || 0;
            let discountRate = Number(document.getElementById("discount").value) / 100 || 0.3;
            let years = Number(document.getElementById("years").value) || 7;

            if (investment <= 0) return alert("مبلغ سرمایه‌گذاری را درست وارد کنید");

            let sharePrice = totalProject / totalShares;
            let shares = investment / sharePrice;
            let ownership = (shares / totalShares) * 100;
            let totalShareProfit = (ownership / 100) * totalProfit;
            let annualProfit = totalShareProfit / years;
            let netProfit = totalShareProfit - investment;
            let roi = ((totalShareProfit - investment) / investment) * 100;
            let cagr = (Math.pow(totalShareProfit / investment, 1 / years) - 1) * 100;
            
            let npv = -investment;
            for (let t = 1; t <= years; t++) npv += annualProfit / Math.pow(1 + discountRate, t);
            
            let pi = (npv + investment) / investment;
            let payback = investment / annualProfit;

            window.lastCalc = {investment, discountRate: discountRate*100, years, shares: shares.toFixed(1), 
                ownership: ownership.toFixed(2), totalShareProfit, annualProfit, netProfit, 
                roi: roi.toFixed(2), cagr: cagr.toFixed(2), npv, pi: pi.toFixed(2), payback: payback.toFixed(1)};

            const resultHTML = `
                <h2 class="text-3xl font-bold mb-8">نتایج محاسبه</h2>
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white p-6 rounded-2xl"><p class="text-slate-500">تعداد سهم</p><p class="text-4xl font-bold">${shares.toFixed(1)}</p></div>
                    <div class="bg-white p-6 rounded-2xl"><p class="text-slate-500">مالکیت</p><p class="text-4xl font-bold text-blue-600">${ownership.toFixed(2)}%</p></div>
                </div>

                <div class="space-y-5 text-lg mb-10">
                    <div class="flex justify-between py-3 border-b"><span>سهم سود کل</span><span class="font-bold">${formatNumber(totalShareProfit)} تومان</span></div>
                    <div class="flex justify-between py-3 border-b"><span>سود سالانه</span><span class="font-bold">${formatNumber(annualProfit)} تومان</span></div>
                    <div class="flex justify-between py-3 border-b"><span>سود خالص</span><span class="font-bold text-emerald-600">${formatNumber(netProfit)} تومان</span></div>
                    <div class="flex justify-between py-3 border-b"><span>ROI</span><span class="font-bold">${roi}%</span></div>
                    <div class="flex justify-between py-3 border-b"><span>CAGR</span><span class="font-bold">${cagr}%</span></div>
                    <div class="flex justify-between py-3 border-b"><span>NPV</span><span class="font-bold text-violet-600">${formatNumber(npv)} تومان</span></div>
                    <div class="flex justify-between py-3"><span>دوره بازگشت سرمایه</span><span class="font-bold">${payback} سال</span></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <h3 class="text-lg font-semibold mb-3 text-center">گردش نقدی سالانه</h3>
                        <div class="chart-wrapper">
                            <canvas id="profitChart"></canvas>
                        </div>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold mb-3 text-center">سود تجمعی</h3>
                        <div class="chart-wrapper">
                            <canvas id="cumulativeChart"></canvas>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById("result").innerHTML = resultHTML;

            setTimeout(() => renderCharts(annualProfit, years), 200);

            document.getElementById("pdfBtn").classList.remove("hidden");
        }

        function renderCharts(annualProfit, years) {
            if (profitChart) profitChart.destroy();
            if (cumulativeChart) cumulativeChart.destroy();

            const yearsArray = Array.from({length: years}, (_, i) => `سال ${i+1}`);

            profitChart = new Chart(document.getElementById('profitChart'), {
                type: 'bar',
                data: {
                    labels: yearsArray,
                    datasets: [{
                        label: 'سود سالانه',
                        data: Array(years).fill(Math.round(annualProfit)),
                        backgroundColor: '#10b981',
                        borderRadius: 8,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });

            const cumulativeData = Array.from({length: years + 1}, (_, i) => Math.round(annualProfit * i));
            cumulativeChart = new Chart(document.getElementById('cumulativeChart'), {
                type: 'line',
                data: {
                    labels: Array.from({length: years + 1}, (_, i) => i === 0 ? 'شروع' : `سال ${i}`),
                    datasets: [{
                        label: 'سود تجمعی',
                        data: cumulativeData,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        tension: 0.4,
                        fill: true,
                        borderWidth: 4,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        async function generatePDF() {
            if (!window.lastCalc) return alert("ابتدا محاسبه کنید");

            const resultDiv = document.getElementById("result");

            try {
                const canvas = await html2canvas(resultDiv, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: "#ffffff",
                    logging: false,
                    allowTaint: true
                });

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');

                doc.setFillColor(37, 99, 235);
                doc.rect(0, 0, 210, 40, 'F');
                doc.setTextColor(255);
                doc.setFontSize(22);
                doc.text("آریا راهبرد نیرو", 105, 18, { align: "center" });
                doc.setFontSize(14);
                doc.text("گزارش تحلیل سرمایه‌گذاری", 105, 28, { align: "center" });

                const pageWidth = 190;
                const imgHeight = (canvas.height * pageWidth) / canvas.width;
                doc.addImage(canvas.toDataURL("image/png", 1.0), 'PNG', 10, 50, pageWidth, Math.min(imgHeight, 280));

                doc.save(`گزارش_آریا_راهبرد_${new Date().toISOString().slice(0,10)}.pdf`);
                alert("✅ گزارش PDF با موفقیت دانلود شد");
            } catch (e) {
                console.error(e);
                alert("خطا در تولید PDF");
            }
        }

        window.onload = calculate;
    </script>
</body>
</html>
