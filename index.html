<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاسبه‌گر حرفه‌ای سرمایه‌گذاری | آریا راهبرد نیرو</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/3.0.3/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Vazirmatn', system-ui, sans-serif; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(16px); }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen py-8">
    <div class="max-w-5xl mx-auto px-4">
        <!-- Header with Logo -->
        <div class="flex items-center justify-between mb-10">
            <div class="flex items-center gap-4">
                <img id="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAACFwAAAhcCAYAAABqw316AAAACXBIWXMAAC4jAAAuIwF4pT92AAAgAElEQVR4nOzaMQEAIAzAMMC/580C/RMJvXtn5gAAAAAAAAAA8O9pBQAAAAAAAADQGC4AAAAAAAAAACLDBQAAAAAAAABAZLgAAAAAAAAAAIgMFwAAAAAAAAAAkeECAAAAAAAAACAyXAAAAAAAAAAARIYLAAAAAAAAAIDIcAEAAAAAAAAAEBkuAAAAAAAAAAAiwwUAAAAAAAAAQGS4AAAAAAAAAACIDBcAAAAAAAAAAJHhAgAAAAAAAAAgMlwAAAAAAAAAAESGCwAAAAAAAACAyHABAAAAAAAAABAZLgAAAAAAAAAAIsMFAAAAAAAAAEBkuAAAAAAAAAAAiAwXAAAAAAAAAACR4QIAAAAAAAAAIDJcAAAAAAAAAABEhgsAAAAAAAAAgMhwAQAAAAAAAAAQGS4AAAAAAAAAACLDBQAA" 
                     alt="لوگوی آریا راهبرد نیرو" class="w-16 h-16 object-contain">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800">آریا راهبرد نیرو</h1>
                    <p class="text-slate-600">طرح بهینه‌سازی روشنایی</p>
                </div>
            </div>
            <div class="text-sm text-slate-500">محاسبه‌گر سرمایه‌گذاری حرفه‌ای</div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
            <!-- Inputs -->
            <div class="lg:col-span-2">
                <div class="glass rounded-3xl shadow-2xl p-8 sticky top-6">
                    <h2 class="text-2xl font-semibold mb-6">محاسبه سود سرمایه‌گذاری</h2>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">مبلغ سرمایه‌گذاری (تومان)</label>
                            <input id="investment" type="number" value="50000000000" class="w-full rounded-2xl px-5 py-4 border border-slate-200 focus:border-blue-500 outline-none text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">نرخ تنزیل (%)</label>
                            <input id="discount" type="number" value="30" class="w-full rounded-2xl px-5 py-4 border border-slate-200 focus:border-blue-500 outline-none text-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-600 mb-1.5">مدت پروژه (سال)</label>
                            <input id="years" type="number" value="7" class="w-full rounded-2xl px-5 py-4 border border-slate-200 focus:border-blue-500 outline-none text-lg">
                        </div>

                        <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-5 rounded-2xl text-lg transition-all">
                            محاسبه
                        </button>

                        <button onclick="generatePDF()" id="pdfBtn" class="w-full hidden border border-slate-300 hover:bg-slate-50 py-4 rounded-2xl font-medium text-slate-700">
                            📄 دانلود گزارش PDF
                        </button>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div class="lg:col-span-3">
                <div id="result" class="glass rounded-3xl shadow-2xl p-8 min-h-[520px]"></div>
            </div>
        </div>
    </div>

    <script>
        function formatNumber(num) {
            return Math.round(num).toLocaleString('fa-IR');
        }

        function calculate() {
            const totalProject = 2500000000000;
            const totalShares = 1000;
            const totalProfit = 17500000000000;

            let investment = Number(document.getElementById("investment").value) || 0;
            let discountRate = Number(document.getElementById("discount").value) / 100 || 0.3;
            let years = Number(document.getElementById("years").value) || 7;

            if (investment <= 0 || years <= 0) return alert("مقادیر وارد شده نامعتبر است");

            let sharePrice = totalProject / totalShares;
            let shares = investment / sharePrice;
            let ownership = (shares / totalShares) * 100;
            let totalShareProfit = ownership / 100 * totalProfit;
            let annualProfit = totalShareProfit / years;
            let netProfit = totalShareProfit - investment;
            let roi = ((totalShareProfit - investment) / investment) * 100;
            let cagr = (Math.pow(totalShareProfit / investment, 1 / years) - 1) * 100;

            // NPV
            let npv = 0;
            for (let t = 1; t <= years; t++) {
                npv += annualProfit / Math.pow(1 + discountRate, t);
            }
            npv -= investment;

            // Profitability Index
            let pi = (npv + investment) / investment;

            // Payback Period (simple)
            let payback = investment / annualProfit;

            // Save for PDF
            window.lastCalc = {
                investment, discountRate: discountRate*100, years, shares: shares.toFixed(1),
                ownership: ownership.toFixed(2), totalShareProfit, annualProfit, netProfit,
                roi: roi.toFixed(2), cagr: cagr.toFixed(2), npv, pi: pi.toFixed(2), payback: payback.toFixed(1)
            };

            // Render Results
            let html = `
                <div class="flex justify-between mb-8">
                    <h2 class="text-3xl font-bold">نتایج محاسبه</h2>
                    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAACFwAAAhcCAYAAABqw316AAAACXBIWXMAAC4jAAAuIwF4pT92AAAgAElEQVR4nOzaMQEAIAzAMMC/580C/RMJvXtn5gAAAAAAAAAA8O9pBQAAAAAAAADQGC4AAAAAAAAAACLDBQAAAAAAAABAZLgAAAAAAAAAAIgMFwAAAAAAAAAAkeECAAAAAAAAACAyXAAAAAAAAAAARIYLAAAAAAAAAIDIcAEAAAAAAAAAEBkuAAAAAAAAAAAiwwUAAAAAAAAAQGS4AAAAAAAAAACIDBcAAAAAAAAAAJHhAgAAAAAAAAAgMlwAAAAAAAAAAESGCwAAAAAAAACAyHABAAAAAAAAABAZLgAAAAAAAAAAIsMFAAAAAAAAAEBkuAAAAAAAAAAAiAwXAAAAAAAAAACR4QIAAAAAAAAAIDJcAAAAAAAAAABEhgsAAAAAAAAAgMhwAQAAAAAAAAAQGS4AAAAAAAAAACLDBQAA" class="w-12 h-12">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-white rounded-2xl p-6"><p class="text-slate-500">تعداد سهم</p><p class="text-4xl font-bold">${shares.toFixed(1)}</p></div>
                    <div class="bg-white rounded-2xl p-6"><p class="text-slate-500">مالکیت</p><p class="text-4xl font-bold text-blue-600">${ownership.toFixed(2)}%</p></div>
                </div>

                <div class="space-y-5 text-lg">
                    <div class="flex justify-between py-3 border-b"><span>سهم از سود کل</span><span class="font-bold">${formatNumber(totalShareProfit)} تومان</span></div>
                    <div class="flex justify-between py-3 border-b"><span>سود سالانه</span><span class="font-bold">${formatNumber(annualProfit)} تومان</span></div>
                    <div class="flex justify-between py-3 border-b"><span>سود خالص</span><span class="font-bold ${netProfit>0?'text-emerald-600':'text-red-600'}">${formatNumber(netProfit)} تومان</span></div>
                    <div class="flex justify-between py-3 border-b"><span>بازده کل (ROI)</span><span class="font-bold">${roi}%</span></div>
                    <div class="flex justify-between py-3 border-b"><span>CAGR</span><span class="font-bold">${cagr}%</span></div>
                    <div class="flex justify-between py-3 border-b"><span>NPV (ارزش فعلی خالص)</span><span class="font-bold text-violet-600">${formatNumber(npv)} تومان</span></div>
                    <div class="flex justify-between py-3 border-b"><span>شاخص سودآوری (PI)</span><span class="font-bold">${pi}</span></div>
                    <div class="flex justify-between py-3"><span>دوره بازگشت سرمایه</span><span class="font-bold">${payback} سال</span></div>
                </div>
            `;
            document.getElementById("result").innerHTML = html;
            document.getElementById("pdfBtn").classList.remove("hidden");
        }

        function generatePDF() {
            if (!window.lastCalc) return alert("ابتدا محاسبه کنید");
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const data = window.lastCalc;
            let y = 20;

            // Header + Logo
            doc.setFillColor(30, 64, 175);
            doc.rect(0, 0, 210, 35, 'F');
            doc.setTextColor(255,255,255);
            doc.setFontSize(20);
            doc.text("آریا راهبرد نیرو", 105, 18, {align:"center"});
            doc.setFontSize(12);
            doc.text("گزارش حرفه‌ای سرمایه‌گذاری", 105, 27, {align:"center"});

            doc.setTextColor(0);
            y = 50;

            // Inputs
            doc.setFontSize(13);
            doc.text("اطلاعات ورودی:", 20, y); y += 10;
            doc.setFontSize(11);
            doc.text(`سرمایه‌گذاری: ${data.investment.toLocaleString('fa-IR')} تومان`, 20, y); y += 8;
            doc.text(`نرخ تنزیل: ${data.discountRate}%`, 20, y); y += 8;
            doc.text(`مدت پروژه: ${data.years} سال`, 20, y); y += 15;

            // Results
            doc.setFontSize(13);
            doc.text("نتایج و شاخص‌های اقتصادی:", 20, y); y += 10;
            doc.setFontSize(11);

            const lines = [
                [`تعداد سهم:`, data.shares],
                [`درصد مالکیت:`, data.ownership + "%"],
                [`سود کل سهم:`, formatNumber(data.totalShareProfit) + " تومان"],
                [`سود سالانه:`, formatNumber(data.annualProfit) + " تومان"],
                [`سود خالص:`, formatNumber(data.netProfit) + " تومان"],
                [`ROI:`, data.roi + "%"],
                [`CAGR:`, data.cagr + "%"],
                [`NPV:`, formatNumber(data.npv) + " تومان"],
                [`شاخص سودآوری (PI):`, data.pi],
                [`دوره بازگشت سرمایه:`, data.payback + " سال"]
            ];

            lines.forEach(([lbl, val]) => {
                doc.text(lbl, 20, y);
                doc.text(val, 180, y, {align:"right"});
                y += 9;
            });

            // Cash Flow Chart
            y += 10;
            doc.setFontSize(13);
            doc.text("نمودار گردش مالی (Cash Flow)", 20, y); y += 10;

            // Simple Chart
            const chartX = 20, chartY = y, chartW = 170, chartH = 60;
            doc.rect(chartX, chartY, chartW, chartH);

            // Axes
            doc.line(chartX, chartY + chartH, chartX + chartW, chartY + chartH); // X
            doc.line(chartX, chartY, chartX, chartY + chartH); // Y

            // Line (simplified cash flow)
            const points = [];
            for (let i = 0; i <= data.years; i++) {
                let x = chartX + (i / data.years) * chartW;
                let cash = i === 0 ? -data.investment/1000000000 : data.annualProfit/1000000000;
                let yPos = chartY + chartH - (cash > 0 ? Math.min(cash*0.8, chartH) : 5);
                points.push({x, y: yPos});
            }

            for (let i = 0; i < points.length - 1; i++) {
                doc.setDrawColor(34, 197, 151);
                doc.setLineWidth(2.5);
                doc.line(points[i].x, points[i].y, points[i+1].x, points[i+1].y);
            }

            // Footer
            doc.setFontSize(10);
            doc.text("این گزارش توسط سیستم محاسبه‌گر هوشمند آریا راهبرد نیرو تولید شده است.", 105, 280, {align:"center"});

            doc.save(`گزارش_سرمایه_گذاری_آریا_${new Date().toISOString().slice(0,10)}.pdf`);
        }

        window.onload = calculate;
    </script>
</body>
</html>
